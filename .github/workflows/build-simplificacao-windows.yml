name: Build SIMP View - Windows x64

on:
  workflow_dispatch:

env:
  RUST_VERSION: "1.75"
  LLVM_VERSION: "15.0.6"
  FLUTTER_VERSION: "3.24.5"
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
  VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"
  VERSION: "1.4.8"
  UPLOAD_ARTIFACT: "true"

jobs:
  generate-bridge:
    uses: ./.github/workflows/bridge.yml

  build-topmostwindow:
    uses: ./.github/workflows/third-party-RustDeskTempTopMostWindow.yml
    with:
      upload-artifact: true
      target: windows-2022
      configuration: Release
      platform: x64
      target_version: Windows10

  build-windows:
    needs: [generate-bridge, build-topmostwindow]
    runs-on: windows-2022
    steps:
      - name: Export GitHub Actions cache environment variables
        uses: actions/github-script@d7906e4ad0b1822421a7e6a35d5ca353c962f410
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Checkout source code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          submodules: recursive

      - name: Restore bridge files
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: bridge-artifact
          path: ./

      - name: Configure custom server & app name (SIMP View)
        shell: bash
        run: |
          CONFIG=libs/hbb_common/src/config.rs
          SERVER=137.131.184.119
          PUBKEY='ZU0225ZMbqCTlUGyiu4v1ScTOZIpMklBvIqfo3ltXJw='
          APPNAME='SimpView'
          sed -i "s|rs-ny\.rustdesk\.com|${SERVER}|g" "$CONFIG"
          sed -i "s|OeVuKk5nlHiXp+APNn0Y3pC1Iwpwn44JGqrQCsWqmBw=|${PUBKEY}|g" "$CONFIG"
          sed -i "s|APP_NAME: RwLock<String> = RwLock::new(\"RustDesk\"|APP_NAME: RwLock<String> = RwLock::new(\"${APPNAME}\"|" "$CONFIG"
          echo "--- Verificação da configuração customizada ---"
          grep -q "\"${SERVER}\"" "$CONFIG" || { echo "ERRO: IP do servidor NAO foi aplicado em $CONFIG (o RustDesk pode ter mudado o valor padrao)"; exit 1; }
          grep -q "${PUBKEY}" "$CONFIG" || { echo "ERRO: chave publica NAO foi aplicada em $CONFIG"; exit 1; }
          grep -q "APP_NAME: RwLock<String> = RwLock::new(\"${APPNAME}\"" "$CONFIG" || { echo "ERRO: APP_NAME NAO foi aplicado em $CONFIG"; exit 1; }
          echo "OK: servidor ${SERVER}, chave publica e APP_NAME=${APPNAME} configurados com sucesso."
          # Patch da senha permanente FORCADA (SIMP View): o submodulo hbb_common
          # aponta para o upstream oficial, entao esta mudanca em config.rs entra
          # como patch no build (mesmo motivo dos sed acima). Sem ela, o comando
          # privado da plataforma (--simpview-set-password) esbarra na trava
          # disable-change-permanent-password e o 1-clique nao-assistido nao grava
          # a senha por-maquina ("rejected by daemon").
          echo "--- Aplicando patch da senha permanente forcada ---"
          git -C libs/hbb_common apply --verbose --ignore-whitespace "${GITHUB_WORKSPACE}/simpview-patches/0001-hbb_common-forced-permanent-password.patch" \
            || { echo "ERRO: patch da senha forcada NAO aplicou (o upstream do hbb_common pode ter mudado config.rs)"; exit 1; }
          grep -q "fn set_permanent_password_forced" "$CONFIG" || { echo "ERRO: set_permanent_password_forced ausente apos o patch"; exit 1; }
          echo "OK: patch da senha permanente forcada aplicado."

      - name: Install LLVM and Clang
        uses: KyleMayes/install-llvm-action@ebc0426251bc40c7cd31162802432c68818ab8f0
        with:
          version: ${{ env.LLVM_VERSION }}

      - name: Install flutter
        uses: subosito/flutter-action@2783a3f08e1baf891508463f8c6653c258246225
        with:
          channel: "stable"
          flutter-version: ${{ env.FLUTTER_VERSION }}
          architecture: x64

      - name: Replace engine with rustdesk custom flutter engine
        run: |
          flutter precache --windows
          Invoke-WebRequest -Uri https://github.com/rustdesk/engine/releases/download/main/windows-x64-release.zip -OutFile windows-x64-release.zip
          Expand-Archive -Path windows-x64-release.zip -DestinationPath windows-x64-release
          mv -Force windows-x64-release/* C:/hostedtoolcache/windows/flutter/stable-${{ env.FLUTTER_VERSION }}-x64/bin/cache/artifacts/engine/windows-x64-release/

      - name: Patch flutter
        shell: bash
        run: |
          cp .github/patches/flutter_3.24.4_dropdown_menu_enableFilter.diff $(dirname $(dirname $(which flutter)))
          cd $(dirname $(dirname $(which flutter)))
          [[ "3.24.5" == ${{env.FLUTTER_VERSION}} ]] && git apply flutter_3.24.4_dropdown_menu_enableFilter.diff

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: x86_64-pc-windows-msvc
          components: "rustfmt"

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
        with:
          prefix-key: windows-2022

      - name: Setup vcpkg with Github Actions binary cache
        uses: lukka/run-vcpkg@b1a0dd252f06b9e25b3c022a9a03bd7a427fb6a2
        with:
          vcpkgDirectory: C:\vcpkg
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}
          doNotCache: false

      - name: Install vcpkg dependencies
        env:
          VCPKG_DEFAULT_HOST_TRIPLET: x64-windows-static
        run: |
          if ! $VCPKG_ROOT/vcpkg \
            install \
            --triplet x64-windows-static \
            --x-install-root="$VCPKG_ROOT/installed"; then
            find "${VCPKG_ROOT}/" -name "*.log" | while read -r _1; do
              echo "$_1:"; cat "$_1"; echo ""
            done
            exit 1
          fi
        shell: bash

      - name: Build SIMP View
        run: |
          python3 .\build.py --portable --flutter --skip-portable-pack --hwcodec --vram
          mv ./flutter/build/windows/x64/runner/Release ./simpview

          Invoke-WebRequest -Uri https://github.com/rustdesk-org/rdev/releases/download/usbmmidd_v2/usbmmidd_v2.zip -OutFile usbmmidd_v2.zip
          Expand-Archive usbmmidd_v2.zip -DestinationPath .
          Remove-Item -Path usbmmidd_v2\Win32 -Recurse
          Remove-Item -Path "usbmmidd_v2\deviceinstaller64.exe", "usbmmidd_v2\deviceinstaller.exe", "usbmmidd_v2\usbmmidd.bat"
          mv -Force .\usbmmidd_v2 ./simpview

      - name: Find Runner.res
        continue-on-error: true
        shell: bash
        run: |
          runner_res=$(find . -name "Runner.res");
          if [ "$runner_res" != "" ]; then
            cp $runner_res ./libs/portable/Runner.res;
          fi

      - name: Download RustDeskTempTopMostWindow artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: topmostwindow-artifacts-x64
          path: "./simpview"

      - name: Upload build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: simpview-windows-x64
          path: simpview

      - name: Build installer (.exe)
        shell: bash
        run: |
          sed -i '/dpiAware/d' res/manifest.xml
          pushd ./libs/portable
          pip3 install -r requirements.txt
          python3 ./generate.py -f ../../simpview/ -o . -e ../../simpview/simpview.exe
          popd
          mkdir -p ./Output
          mv ./target/release/rustdesk-portable-packer.exe ./Output/SimpView-${{ env.VERSION }}-x64.exe

      - name: Upload installer
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: simpview-installer-x64
          path: Output/SimpView-*.exe
